name: "Mvn Build"

on:
  #push:
    #branches: [ "main" ]
  #pull_request:
    #branches: [ "main" ]
  workflow_dispatch:
  schedule:
    - cron: '42 11 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

env:
  JFrog_Mvn_Repo: "demo-mvn-virtual"
  JFrog_Docker_Repo: "weiapp-docker-dev-local"
  Build_name: "github-mvn-build"
  
jobs:
  security-java-demo:
    name: Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'
        cache: maven
  
    - name: Pin Maven to 3.9.11
      run: |
        curl -fsSL https://archive.apache.org/dist/maven/maven-3/3.9.11/binaries/apache-maven-3.9.11-bin.tar.gz -o /tmp/maven.tar.gz
        sudo tar -xzf /tmp/maven.tar.gz -C /opt
        echo "/opt/apache-maven-3.9.11/bin" >> $GITHUB_PATH

    - name: Setup JFrog CLI
      uses: jfrog/setup-jfrog-cli@v4

      env:
        # JFrog Platform url
        JF_URL: ${{ secrets.JF_URL }}
        # JFrog Platform access token
        JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
    
        #- name: Configure Supinfo CLI
        #  run: |
        #    echo $JF_TOKEN | jf c add demo --interactive=false --url=$JF_URL --access-token-stdin
        #    jf config use demo

    - name: Build Maven Project
      run: |
        jf rt ping
        jf  mvnc --repo-resolve-releases=$JFrog_Mvn_Repo --repo-resolve-snapshots=$JFrog_Mvn_Repo --repo-deploy-releases=$JFrog_Mvn_Repo --repo-deploy-snapshots=$JFrog_Mvn_Repo
        jf  mvn clean install --build-name=$Build_name  --build-number=$GITHUB_RUN_NUMBER

    - name: Build Docker Project and Push Docker image
      run: |
        docker build -t demo.jfrogchina.com/$JFrog_Docker_Repo/mvn-securityscan-test:$GITHUB_RUN_NUMBER . 
        jf docker push demo.jfrogchina.com/$JFrog_Docker_Repo/mvn-securityscan-test:$GITHUB_RUN_NUMBER --build-name=$GITHUB_RUN_NUMBER --build-number=$GITHUB_RUN_NUMBER  
       
    - name: Publish Build-Info to Supinfo Repo
      run: |
        jf rt bce $Build_name $GITHUB_RUN_NUMBER 
        jf rt bag $Build_name $GITHUB_RUN_NUMBER 
        jf rt bp $Build_name $GITHUB_RUN_NUMBER 

  
